<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stations — RCC WMS</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <nav>
      <div class="brand">
        <img
          class="brand-logo"
          src="images/rcc_logo.png"
          alt="RCC"
          onerror="this.style.display = 'none'"
        />
        <div class="brand-text">
          Rajshahi City Corporation
          <span>Waste Management System</span>
        </div>
      </div>
      <div class="nav-links" id="navLinks">
        <a
          class="nav-btn"
          href="index.html"
          data-page="index.html"
          data-i18n="home"
          >Home</a
        >
        <a
          class="nav-btn active"
          href="stations.html"
          data-page="stations.html"
          data-i18n="stations"
          >Stations</a
        >
        <a class="nav-btn" href="map.html" data-page="map.html" data-i18n="map"
          >Map</a
        >
        <a
          class="nav-btn"
          href="about.html"
          data-page="about.html"
          data-i18n="about"
          >About</a
        >
        <div class="lang-toggle">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="bn">বাং</button>
        </div>
        <button class="theme-toggle" title="Toggle Dark/Light Mode">☀️</button>
      </div>
    </nav>

    <div class="page-bg">
      <div class="page-body">
        <div class="page-eyebrow" data-i18n="liveMon">Live Monitoring</div>
        <h1 class="page-title">
          <strong data-i18n="transferStations">Transfer Stations</strong>
        </h1>
        <div class="page-line"></div>

        <div class="sts-grid" id="stationsGrid">
          <p
            style="font-size: 0.88rem; color: var(--text-muted)"
            data-i18n="loading"
          >
            Loading stations…
          </p>
        </div>
      </div>

      <div id="modalsContainer"></div>

      <footer>
        © 2026 Rajshahi City Corporation · Waste Management System
      </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/stations.js"></script>
  </body>
</html>
